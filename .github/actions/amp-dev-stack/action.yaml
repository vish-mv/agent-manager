name: Bring up AMP dev stack (build-from-source)
description: >
  Stands up the full AMP platform on k3d from the working tree — building the
  agent-manager-service, traces-observer-service, and
  python-instrumentation-provider images from source and loading them into
  k3d (NOT the released images quick-start/install.sh uses). This is what
  lets the instrumentation matrix's heavy tier validate the *current* PR's
  observer + instrumentation changes end to end.

  Mirrors the local `make setup` chain, minus Colima (macOS-only) and the
  console (UI, not needed by the heavy tier).

  FIRST-RUN-TUNABLE: this has not yet run in CI. The likely friction points
  are setup-platform.sh's Node version check, whether the docker-compose
  side starts the console (we don't need it), and the background
  port-forwards binding 9000/9098. Tune here as the first real run surfaces
  issues; the heavy jobs that call this are continue-on-error until it's
  green.

runs:
  using: composite
  steps:
    - uses: ./.github/actions/setup-go
    - name: Install k3d
      shell: bash
      run: |
        curl -fsSL -o /tmp/k3d https://github.com/k3d-io/k3d/releases/download/v5.8.3/k3d-linux-amd64
        echo "dbaa79a76ace7f4ca230a1ff41dc7d8a5036a8ad0309e9c54f9bf3836dbe853e  /tmp/k3d" | sha256sum -c -
        sudo install /tmp/k3d /usr/local/bin/k3d
        k3d version
    - name: Install yq
      shell: bash
      run: |
        curl -fsSL -o /tmp/yq https://github.com/mikefarah/yq/releases/download/v4.45.4/yq_linux_amd64
        echo "b96de04645707e14a12f52c37e6266832e03c29e95b9b139cddcae7314466e69  /tmp/yq" | sha256sum -c -
        sudo install /tmp/yq /usr/local/bin/yq
    - name: Install helm + kubectl
      shell: bash
      run: |
        set -euo pipefail
        # get-helm-3 verifies the downloaded archive's checksum itself.
        curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
        # kubectl: verify against the official published sha256 (self-fetched,
        # so no hardcoded hash to rot when the pin bumps).
        curl -fsSL -o /tmp/kubectl "https://dl.k8s.io/release/v1.31.0/bin/linux/amd64/kubectl"
        curl -fsSL -o /tmp/kubectl.sha256 "https://dl.k8s.io/release/v1.31.0/bin/linux/amd64/kubectl.sha256"
        echo "$(cat /tmp/kubectl.sha256)  /tmp/kubectl" | sha256sum --check
        sudo install /tmp/kubectl /usr/local/bin/kubectl
    - name: Bring up AMP (build-from-source)
      shell: bash
      run: |
        set -euo pipefail
        # k3d cluster + prerequisites (Gateway API, cert-manager, …)
        make setup-k3d
        # OpenChoreo + builds & loads traces-observer + instrumentation images
        # from source into k3d.
        make setup-openchoreo
        # Build + start the core platform (agent-manager-service via compose).
        make setup-platform
        make dev-migrate
        # Expose AMP API (9000) + traces-observer (9098) on localhost.
        (cd deployments/scripts && ./port-forward.sh --platform --background)
        make setup-gateway
        (cd deployments/scripts && ./port-forward.sh --background)
