name: Heavy-tier snapshot

# Builds the pre-baked k3d cluster snapshot the heavy-tier driver restores
# from. Triggered on `workflow_dispatch` and when any AMP service image or
# the helm charts change — the snapshot's value is that it bundles a known-
# good combination, so it must be re-baked whenever that combination shifts.
#
# This workflow is intentionally a thin orchestration of the existing
# `deployments/scripts/setup-*.sh` scripts so the local-dev and CI paths
# share their plumbing. The heavy lifting (cluster bring-up, helm install,
# readiness checks) lives in those scripts.
#
# OUTPUT: an artifact named `amp-heavy-snapshot` carrying the docker-saved
# image set the cluster needs. The driver workflow restores it via
# `k3d cluster import-images`.

on:
  workflow_dispatch:
    inputs:
      keep_cluster:
        description: 'Keep the k3d cluster after snapshotting (for debugging)'
        required: false
        default: 'false'
  push:
    branches: [main]
    paths:
      - 'deployments/helm-charts/**'
      - 'deployments/scripts/setup-k3d.sh'
      - 'deployments/scripts/setup-prerequisites.sh'
      - 'deployments/scripts/setup-openchoreo.sh'
      - 'deployments/scripts/setup-platform.sh'
      - 'agent-manager-service/Dockerfile'
      - 'traces-observer-service/Dockerfile'
      - 'python-instrumentation-provider/Dockerfile'
      - '.github/release-config.json'
      - '.github/workflows/heavy-tier-snapshot.yaml'

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install k3d
        run: |
          curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash
          k3d version

      - name: Install helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.2

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.31.0

      # Cluster + prereqs + OpenChoreo + AMP platform follow the same
      # sequence local dev uses. If these scripts evolve, the snapshot
      # automatically reflects the change on the next dispatch.
      - name: Provision k3d cluster
        run: |
          cd deployments/scripts
          ./setup-k3d.sh
          ./setup-prerequisites.sh

      - name: Install OpenChoreo
        run: |
          cd deployments/scripts
          ./setup-openchoreo.sh "$GITHUB_WORKSPACE"

      # AMP-on-k3d gotcha (MEMORY.md): CoreDNS needs `host.k3d.internal`
      # for the gateway controller to reach the control plane. The
      # OpenChoreo bring-up handles this in local dev; if it doesn't fire
      # in CI, deploy-time agent invocations will get 503s.
      - name: Verify host.k3d.internal resolves
        run: |
          kubectl run dnscheck --rm -i --restart=Never --image=busybox -- \
            nslookup host.k3d.internal || true

      - name: Wait for AMP stack readiness
        run: |
          # Per-namespace wait, matching setup-openchoreo.sh. `kubectl wait`
          # rejects `--all-namespaces` with `-l` selectors, so we iterate
          # the namespaces the openchoreo bring-up creates.
          for ns in \
              openchoreo-control-plane \
              openchoreo-data-plane \
              openchoreo-workflow-plane \
              openchoreo-observability-plane \
              amp-thunder; do
            if kubectl get namespace "$ns" >/dev/null 2>&1; then
              kubectl wait -n "$ns" --for=condition=available \
                --timeout=300s deployment --all || \
                echo "::warning::namespace $ns not fully ready"
            fi
          done

      - name: Resolve AMP image set from release-config.json
        id: images
        run: |
          # Build the list of images to snapshot. AMP product images get
          # their tags from the release pipeline (default to the floating
          # `latest`); init-container images are tagged per
          # release-config.json's python-instrumentation-provider matrix.
          python3 <<'PY' > image-list.txt
          import json, pathlib
          rc = json.loads(pathlib.Path(".github/release-config.json").read_text())
          tags = []
          for img in rc.get("images", []):
              tags.append(f"ghcr.io/wso2/{img['name']}:latest")
          for entry in rc.get("python-instrumentation-provider", []):
              for py in entry["python_versions"]:
                  tags.append(
                      "ghcr.io/wso2/amp-python-instrumentation-provider:"
                      f"{entry['instrumentation_version']}-python{py}"
                  )
          print("\n".join(tags))
          PY
          echo "image list:"
          cat image-list.txt

      - name: Pull and snapshot AMP images
        run: |
          mkdir -p snapshot
          # Pull every image, then docker save the whole set into one
          # tarball. `k3d image import` (the inverse on restore) accepts
          # docker-save archives directly.
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            docker pull "$tag" || echo "::warning::failed to pull $tag"
          done < image-list.txt
          # shellcheck disable=SC2046
          docker save -o snapshot/images.tar $(tr '\n' ' ' < image-list.txt)
          ls -lh snapshot/

      - name: Upload snapshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: amp-heavy-snapshot
          path: snapshot/images.tar
          retention-days: 14

      - name: Cleanup
        if: ${{ always() && (github.event_name != 'workflow_dispatch' || github.event.inputs.keep_cluster != 'true') }}
        run: |
          k3d cluster delete openchoreo-local-setup || true
