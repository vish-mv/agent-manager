{{- if .Values.agentManagerService.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "agent-management-platform.agentManagerService.fullname" . }}-instrumentation-extension
  labels:
    {{- include "agent-management-platform.agentManagerService.labels" . | nindent 4 }}
data:
  # Consumed by the agent-manager-service instrumentation catalog loader.
  # An empty additionalInstrumentationVersions list is a no-op; the
  # catalog then comes entirely from the embedded baseline.
  instrumentation-extension.yaml: |
    additionalInstrumentationVersions:
{{ toYaml .Values.agentManagerService.config.otel.additionalInstrumentationVersions | indent 6 }}
{{- end }}
