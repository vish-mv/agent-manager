---
# APIGateway CR — watched by the gateway-operator.
# When applied, the operator:
#   1. Reads Helm values from the configRef ConfigMap
#   2. Runs helm install/upgrade for the gateway stack (controller + router + policy-engine)
#   3. The gateway-controller reads APIP_GW_GATEWAY_REGISTRATION_TOKEN from the Secret
#      referenced by spec.controlPlane.tokenSecretRef (created by the bootstrap job)
#   4. The gateway-controller connects to Agent Manager and stays registered
apiVersion: gateway.api-platform.wso2.com/v1alpha1
kind: APIGateway
metadata:
  name: {{ include "wso2-amp-gateway-extension.apiGatewayName" . }}
  namespace: {{ .Values.apiGateway.namespace }}
  labels:
    {{- include "wso2-amp-gateway-extension.labels" . | nindent 4 }}
    app.kubernetes.io/component: api-platform-gateway
spec:
  apiSelector:
    {{- toYaml .Values.apiGateway.apiSelector | nindent 4 }}

  controlPlane:
    host: {{ .Values.apiGateway.controlPlane.host | quote }}
    tokenSecretRef:
      name: {{ include "wso2-amp-gateway-extension.tokenSecretName" . }}
      key: {{ .Values.gateway.tokenSecret.key | quote }}
    {{- with .Values.apiGateway.controlPlane.tls }}
    tls:
      enabled: {{ .enabled | default false }}
    {{- end }}

  configRef:
    name: {{ include "wso2-amp-gateway-extension.configMapName" . }}
