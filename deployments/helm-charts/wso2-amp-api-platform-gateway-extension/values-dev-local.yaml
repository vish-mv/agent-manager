# Dev overrides when agent-manager runs locally on the host (not via docker-compose).
# Stack on top of values-dev.yaml with: -f values-dev.yaml -f values-dev-local.yaml
#
# docker-compose maps agent-manager container port 8080 → host port 9000,
# so k3d pods reach it via host.docker.internal:9000.

apiGateway:
  config:
    policyConfigurations:
      jwtauth_v1:
        keymanagers:
        - name: agent-manager-service
          issuer: agent-manager-service
          jwks:
            remote:
              uri: http://host.docker.internal:9000/auth/external/jwks.json
              skipTlsVerify: true
        - name: ThunderKeyManager
          issuer: http://thunder.amp.localhost:8080
          jwks:
            remote:
              uri: http://amp-thunder-extension-service.amp-thunder:8090/oauth2/jwks
              skipTlsVerify: true
